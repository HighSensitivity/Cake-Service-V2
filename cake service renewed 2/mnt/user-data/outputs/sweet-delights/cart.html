<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart — Sweet Delights</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo"><h1>Sweet Delights</h1></div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <div class="cart-icon">
        <a href="cart.html" class="active">
          <i class="fas fa-shopping-bag"></i>
          <span class="cart-count">0</span>
        </a>
      </div>
    </div>
  </nav>

  <main>
    <div class="page-container">
      <h2 class="page-title">Your Cart</h2>

      <div id="cart-content">
        <!-- Populated by JS -->
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-content">
      <div class="footer-section">
        <h3>Sweet Delights</h3>
        <p>Bringing sweetness to your special moments.</p>
      </div>
      <div class="footer-section">
        <h3>Quick Links</h3>
        <a href="about.html">About Us</a>
        <a href="index.html">Shop</a>
      </div>
      <div class="footer-section">
        <h3>Contact Us</h3>
        <p>Email: info@sweetdelights.com</p>
        <p>Phone: (555) 123-4567</p>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2025 Sweet Delights. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/script.js"></script>
  <script>
    function renderCart() {
      const cart = getCart();
      const container = document.getElementById('cart-content');

      if (cart.length === 0) {
        container.innerHTML = `
          <div class="empty-cart-msg">
            <i class="fas fa-shopping-bag"></i>
            <p>Your cart is empty</p>
            <a href="index.html">Browse our cakes</a>
          </div>`;
        return;
      }

      let subtotal = 0;
      const itemsHTML = cart.map(item => {
        const total = item.price * item.quantity;
        subtotal += total;
        return `
          <div class="cart-item" data-id="${item.id}">
            <img src="${item.image}" alt="${item.title}">
            <div class="cart-item-info">
              <h3>${item.title}</h3>
              <span class="unit-price">$${item.price} each</span>
            </div>
            <div class="cart-item-controls">
              <span class="item-total-price">$${total.toFixed(0)}</span>
              <div class="inline-qty">
                <button class="qty-btn" onclick="cartUpdateQty(${item.id}, ${item.quantity - 1})">
                  <i class="fas fa-minus"></i>
                </button>
                <span class="qty-display">${item.quantity}</span>
                <button class="qty-btn" onclick="cartUpdateQty(${item.id}, ${item.quantity + 1})">
                  <i class="fas fa-plus"></i>
                </button>
              </div>
              <button class="remove-btn" onclick="cartRemove(${item.id})" title="Remove">
                <i class="fas fa-trash-alt"></i>
              </button>
            </div>
          </div>`;
      }).join('');

      const deliveryFee = subtotal > 100 ? 0 : 8;
      const total = subtotal + deliveryFee;

      container.innerHTML = `
        <div class="cart-items-list">${itemsHTML}</div>
        <div class="cart-summary-box">
          <div class="summary-row">
            <span>Subtotal</span><span>$${subtotal.toFixed(0)}</span>
          </div>
          <div class="summary-row">
            <span>Delivery</span>
            <span>${deliveryFee === 0 ? '<span style="color:var(--sage);font-weight:600">Free</span>' : '$' + deliveryFee}</span>
          </div>
          ${deliveryFee > 0 ? `<div style="font-size:0.8rem;color:var(--mocha);opacity:0.6;text-align:right;margin-top:0.25rem">Free delivery on orders over $100</div>` : ''}
          <div class="summary-row total">
            <span>Total</span><span>$${total.toFixed(0)}</span>
          </div>
          <button class="checkout-btn" onclick="window.location.href='confirm-payment.html'">
            <i class="fas fa-lock"></i> Proceed to Checkout
          </button>
          <a href="index.html" class="continue-link">← Continue Shopping</a>
        </div>`;
    }

    window.cartUpdateQty = function(id, newQty) {
      if (newQty < 1) {
        if (confirm('Remove this item from your cart?')) cartRemove(id);
        return;
      }
      const cart = getCart();
      const item = cart.find(i => i.id === id);
      if (item) { item.quantity = newQty; saveCart(cart); }
      renderCart();
      updateCartBadge();
    };

    window.cartRemove = function(id) {
      const cart = getCart().filter(i => i.id !== id);
      saveCart(cart);
      showToast('Item removed', 'fa-trash-alt');
      renderCart();
      updateCartBadge();
    };

    document.addEventListener('DOMContentLoaded', renderCart);
  </script>
</body>
</html>
